<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Secretary Transcribe — Afrikaans to English</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e6e8ee;
    --muted: #8b93a7;
    --accent: #6ea8ff;
    --accent-hover: #4d8cf0;
    --error: #ff6b6b;
    --success: #5fc28a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 20px 80px; }
  header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  h1 .muted { color: var(--muted); font-weight: 400; }
  .key-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .key-row input { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; min-width: 220px; }
  button { background: var(--accent); color: #0a0d12; border: 0; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  button:hover { background: var(--accent-hover); }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  button.ghost:hover { color: var(--text); border-color: var(--text); }
  a.linkbtn { color: var(--accent); cursor: pointer; font-size: 13px; }
  a.linkbtn:hover { text-decoration: underline; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .drop {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 48px 20px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 120ms, background 120ms;
  }
  .drop:hover, .drop.over { border-color: var(--accent); background: var(--panel-2); color: var(--text); }
  .drop strong { color: var(--text); display: block; margin-bottom: 4px; }
  .controls { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-top: 16px; font-size: 13px; }
  .controls label { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .controls input[type="text"] { flex: 1; min-width: 180px; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; }
  .file-info { margin-top: 14px; font-size: 13px; color: var(--muted); }
  .status { margin-top: 16px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .banner { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 13px; }
  .banner.error { background: rgba(255, 107, 107, 0.10); border: 1px solid rgba(255, 107, 107, 0.4); color: var(--error); }
  .results { margin-top: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px) { .results { grid-template-columns: 1fr; } }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card h3 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; }
  .card pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace; font-size: 13.5px; color: var(--text); }
  .card .toolbar { display: flex; justify-content: flex-end; margin-top: 12px; }
  .meta { margin-top: 14px; font-size: 12px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Secretary Transcribe <span class="muted">— Afrikaans to English</span></h1>
  </header>

  <div class="panel">
    <div class="drop" id="drop">
      <strong>Drop an audio file here</strong>
      or click to choose (.opus .ogg .m4a .mp3 .wav .webm .flac .aac)
      <input type="file" id="fileInput" class="hidden" accept=".opus,.ogg,.m4a,.mp3,.mp4,.mpeg,.mpga,.wav,.webm,.flac,.aac,audio/*" />
    </div>
    <div class="controls">
      <label><input type="checkbox" id="cheap" /> Cheap mode (gpt-4o-mini)</label>
      <input type="text" id="ctx" placeholder="Optional context override (e.g. citrus, contracts)" />
    </div>
    <div class="file-info hidden" id="fileInfo"></div>
    <div class="status hidden" id="status"><div class="spinner"></div><span id="statusText">Transcribing…</span></div>
    <div class="banner error hidden" id="error"></div>
  </div>

  <div class="results hidden" id="results">
    <div class="card">
      <h3>Afrikaans</h3>
      <pre id="afrikaans"></pre>
    </div>
    <div class="card">
      <h3>English</h3>
      <pre id="english"></pre>
      <div class="toolbar"><button class="ghost" id="copyEnglish">Copy English</button></div>
    </div>
  </div>
  <div class="meta hidden" id="meta"></div>
</div>

<script>
  window.__API_KEY__ = "__SECRETARY_API_KEY__";
  const $ = (id) => document.getElementById(id);
  const drop = $("drop"), fileInput = $("fileInput");
  const fileInfo = $("fileInfo"), statusEl = $("status"), statusText = $("statusText"), errorEl = $("error");
  const results = $("results"), afEl = $("afrikaans"), enEl = $("english"), metaEl = $("meta");

  function showError(msg) { errorEl.textContent = msg; errorEl.classList.remove("hidden"); }
  function clearError() { errorEl.classList.add("hidden"); errorEl.textContent = ""; }
  function fmtBytes(n) {
    if (n < 1024) return n + " B";
    if (n < 1024*1024) return (n/1024).toFixed(1) + " KB";
    return (n/1024/1024).toFixed(2) + " MB";
  }

  drop.addEventListener("click", () => fileInput.click());
  drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("over"); });
  drop.addEventListener("dragleave", () => drop.classList.remove("over"));
  drop.addEventListener("drop", (e) => {
    e.preventDefault();
    drop.classList.remove("over");
    if (e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener("change", () => {
    if (fileInput.files && fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  async function handleFile(file) {
    clearError();
    results.classList.add("hidden"); metaEl.classList.add("hidden");
    fileInfo.textContent = `${file.name} — ${fmtBytes(file.size)}`;
    fileInfo.classList.remove("hidden");

    const key = window.__API_KEY__;
    if (!key) { showError("Server misconfigured: API_KEY env var is not set."); return; }

    const params = new URLSearchParams();
    if ($("cheap").checked) params.set("model", "mini");
    const ctx = $("ctx").value.trim();
    if (ctx) params.set("context", ctx);
    const url = "/api/transcribe" + (params.toString() ? "?" + params.toString() : "");

    const fd = new FormData();
    fd.append("file", file);

    statusEl.classList.remove("hidden");
    statusText.textContent = "Transcribing…";
    try {
      const res = await fetch(url, { method: "POST", headers: { "X-API-Key": key }, body: fd });
      const ct = res.headers.get("content-type") || "";
      const data = ct.includes("application/json") ? await res.json() : { detail: await res.text() };

      if (!res.ok) {
        if (res.status === 401) { showError("Server's embedded API key was rejected — check Coolify env."); return; }
        const detail = typeof data.detail === "string" ? data.detail : (data.detail && data.detail.detail) || JSON.stringify(data.detail || data);
        showError(`${res.status}: ${detail}`);
        return;
      }
      afEl.textContent = data.afrikaans || "";
      enEl.textContent = data.english || "";
      metaEl.innerHTML = `<span>Duration: ${(data.duration_seconds || 0).toFixed(1)}s</span><span>Model: ${data.model || "?"}</span><span>File: ${data.filename || ""}</span>`;
      results.classList.remove("hidden"); metaEl.classList.remove("hidden");
    } catch (err) {
      showError("Network error: " + (err && err.message ? err.message : String(err)));
    } finally {
      statusEl.classList.add("hidden");
    }
  }

  $("copyEnglish").addEventListener("click", async () => {
    const txt = enEl.textContent || "";
    try { await navigator.clipboard.writeText(txt); $("copyEnglish").textContent = "Copied"; setTimeout(() => $("copyEnglish").textContent = "Copy English", 1200); }
    catch { showError("Clipboard access denied."); }
  });
</script>
</body>
</html>
